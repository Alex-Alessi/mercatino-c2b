{% extends "base.html" %}

{% block title %}Nuova proposta{% endblock %}

{% block content %}
<div class="card">
    <h1>Proponi un oggetto</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">Invia proposta</button>
    </form>
</div>
{% endblock %}
