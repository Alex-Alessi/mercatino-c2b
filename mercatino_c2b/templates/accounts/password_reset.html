{% extends "base.html" %}

{% block title %}Recupera password{% endblock %}

{% block content %}
<div class="card">
    <h1>Recupera password</h1>

    <p>
        Inserisci l'indirizzo email associato al tuo account.
        Ti invieremo un link per impostare una nuova password.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">
            Invia link di recupero
        </button>
    </form>
</div>
{% endblock %}
