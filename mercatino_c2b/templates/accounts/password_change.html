{% extends "base.html" %}

{% block title %}Cambia password{% endblock %}

{% block content %}
<div class="card">
    <h1>Cambia password"</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="button" type="submit">
            Salva nuova password
        </button>
    </form>
</div>
{% endblock %}
