{% extends "base.html" %}

{% block title %}Profilo{% endblock %}

{% block content %}
<div class="card">
    <h1>Profilo</h1>

    <p><strong>Nome:</strong> {{ request.user.first_name }}</p>

    <p><strong>Cognome:</strong> {{ request.user.last_name }}</p>

    <p><strong>Email:</strong> {{ request.user.email }}</p>

    <p><strong>Telefono:</strong> {{ request.user.profile.phone }}</p>

    <a class="button" href="{% url 'password_change' %}">
        Cambia password
    </a>
</div>
{% endblock %}
